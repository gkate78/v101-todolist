services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_DIR=/app/data
    volumes:
      - todo_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  todo_data:
